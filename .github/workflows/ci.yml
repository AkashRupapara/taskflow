name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (vet + unit + integration)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: api/go.sum
      - name: go vet
        working-directory: api
        run: go vet ./...
      - name: go test (unit + integration)
        working-directory: api
        env:
          DATABASE_URL: postgres://taskflow:taskflow@localhost:5432/taskflow?sslmode=disable
        run: go test ./...

  frontend:
    name: Frontend (typecheck + build + unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - working-directory: web
        run: npm ci
      - name: typecheck + build
        working-directory: web
        run: npm run build
      - name: unit tests
        working-directory: web
        run: npm test

  e2e:
    name: E2E (Playwright, full stack)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U taskflow"
          --health-interval 5s --health-timeout 3s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "stable"
          cache-dependency-path: api/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Start API
        working-directory: api
        env:
          DATABASE_URL: postgres://taskflow:taskflow@localhost:5432/taskflow?sslmode=disable
        run: |
          go run . &
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/api/health && break
            sleep 2
          done
      - name: Install web deps + browser
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run e2e
        working-directory: web
        run: npm run test:e2e
